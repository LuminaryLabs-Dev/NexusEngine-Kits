name: cdn-smoke

on:
  push:
    paths:
      - "installer/**"
      - "bundles/**"
      - "domains/**"
      - "examples/browser-cdn/**"

jobs:
  cdn-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run generate:cdn-index
      - run: npm test
