name: parity-report

on:
  push:
    paths:
      - "parity/**"
      - "scripts/generate-parity-report.mjs"

jobs:
  parity-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run generate:parity-report
