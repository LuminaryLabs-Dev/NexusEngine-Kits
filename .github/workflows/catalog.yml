name: catalog

on:
  push:
    paths:
      - "kit-catalog.json"
      - "domain-catalog.json"
      - "bundle-catalog.json"
      - "installer/kit-catalog.js"
      - "scripts/validate-catalog.mjs"

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check:catalog
