name: Reconcile procedural creatures catalogs

on:
  push:
    branches: [main]
    paths:
      - .agent/reconcile-procedural-creatures

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Generate catalogs and mirrors
        run: node scripts/build-catalog.mjs
      - name: Commit generated files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add installer/generated-catalog.js installer/generated-factories.js \
            kit-catalog.json domain-catalog.json bundle-catalog.json \
            nexusengine.registry.json promotion-ledger.json parity/parity-status.json \
            PROMOTION-LEDGER.md docs/CDN-INDEX.txt \
            kits/procedural-creatures/procedural-creature-body-kit/kit.json
          if git diff --cached --quiet; then
            echo "Generated files already reconciled."
            exit 0
          fi
          git commit -m "Rebuild procedural creatures catalogs"
          git push origin HEAD:main
