<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NexusRealtime Kits CDN Example</title>
  </head>
  <body>
    <pre id="out">loading...</pre>
    <script type="module">
      import { createNexusRealtimeKitInstaller } from "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusRealitime-Kits@main/installer/index.js";

      const engine = {
        kits: [],
        installKit(kit) {
          this.kits.push(kit);
          return kit;
        }
      };

      const installer = createNexusRealtimeKitInstaller();
      await installer.installKit(engine, "completion-ledger-kit");
      document.getElementById("out").textContent = JSON.stringify(engine.kits.map((kit) => kit.id), null, 2);
    </script>
  </body>
</html>
